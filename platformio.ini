[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
board_build.filesystem = littlefs
upload_speed = 460800
build_flags =
    -Os
    -DGXEPD2_DISPLAY_CLASS=GxEPD2_BW
    -DGXEPD2_DRIVER_CLASS=GxEPD2_290_T94
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    -DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=2048
    -DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=2048
    -DCONFIG_MBEDTLS_DYNAMIC_BUFFER=1
    ; Brownout detection at default level (removed level 5 - too sensitive)
    -DINKSPET_VERSION=\"1.0.0\"
lib_deps =
    bblanchon/ArduinoJson@^6.21.3
    esphome/ESPAsyncWebServer-esphome
    olikraus/U8g2_for_Adafruit_GFX@^1.8.0
    zinggjm/GxEPD2@^1.5.8
    adafruit/Adafruit NeoPixel@^1.12.0
    arduino-libraries/NTPClient@^3.2.1
